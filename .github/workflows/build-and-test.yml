name: Build and Test

on:
  push:
    branches:
      - main

  pull_request:
    branches:
      - main

  workflow_dispatch:

jobs:
  build_and_test_with_cmake:
    name: CMake
    permissions:
      contents: read
    strategy:
      matrix:
        os:
        - ubuntu-latest
        compiler: 
        - {c: gcc, cxx: g++}
        - {c: clang, cxx: clang++}

        include:
        - os: macos-latest
          compiler: {c: clang, cxx: clang++}
        - os: windows-latest
          compiler: {c: cl, cxx: cl}
        - os: windows-latest
          compiler: {c: gcc, cxx: g++}
          generator: "Ninja"

    env:
      BUILD_TYPE: Debug
    runs-on: ${{ matrix.os }}
    defaults:
      run:
        shell: bash -el {0}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Install coverage tool
        id: install-coverage
        if: matrix.compiler.c != 'cl' && matrix.compiler.cxx != 'cl'
        uses: gigabit-clowns/.github/.github/composites/install-cpp-coverage-tool@main
        with:
          compiler-c: ${{ matrix.compiler.c }}
          compiler-cxx: ${{ matrix.compiler.cxx }}

      - name: Configure and build with CMake
        uses: threeal/cmake-action@v2
        with:
          source-dir: ${{ github.workspace }}
          build-dir: "${{ github.workspace }}/build"
          c-compiler: ${{ matrix.compiler.c }}
          cxx-compiler: ${{ matrix.compiler.cxx }}
          generator: ${{ matrix.generator }}
          options: |
            CMAKE_BUILD_TYPE=${{ env.BUILD_TYPE }}
            CMAKE_EXPORT_COMPILE_COMMANDS=ON
            XMIPP4_CORE_ENABLE_COVERAGE=ON
          run-build: true
          build-args: --config ${{ env.BUILD_TYPE }}

      - name: Run tests
        uses: gigabit-clowns/.github/.github/composites/run-ctest@main

      - name: Generate coverage report
        if: matrix.compiler.c != 'cl' && matrix.compiler.cxx != 'cl'
        uses: gigabit-clowns/.github/.github/composites/run-ctest/coverage-report@main
        with:
          compiler-c: ${{ matrix.compiler.c }}
          compiler-cxx: ${{ matrix.compiler.cxx }}
          cl-coverage-tool: ${{ steps.install-coverage.outputs.opencppcoverage-pwsh }}
          report-path: ${{ github.workspace }}/coverage.xml

      - name: Upload coverage report
        if: matrix.compiler.c != 'cl' && matrix.compiler.cxx != 'cl'
        uses: actions/upload-artifact@v7
        with:
          name: coverage-report-${{ matrix.os }}-${{ matrix.compiler.c }}-${{ matrix.compiler.cxx }}
          path: coverage.xml

      - name: Upload build folder (ubuntu-latest + gcc only)
        uses: actions/upload-artifact@v7
        if: matrix.os == 'ubuntu-latest' && matrix.compiler.c == 'gcc'
        with:
          name: build-artifact
          path: build

  rust_build_and_test:
    name: Rust
    permissions:
      contents: read
    runs-on: ubuntu-latest
    defaults:
      run:
        shell: bash -el {0}
        working-directory: rust
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: rust

      - name: Rust format check
        run: cargo fmt --all -- --check

      - name: Rust check
        run: cargo check --workspace --all-targets

      - name: Rust clippy
        run: cargo clippy --workspace --all-targets -- -D warnings

      - name: Rust tests
        run: cargo test --workspace

  docs_build_and_rust_bridge_test:
    name: Docs + CMake Rust bridge
    permissions:
      contents: read
    runs-on: ubuntu-latest
    defaults:
      run:
        shell: bash -el {0}
    env:
      BUILD_TYPE: Debug
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: rust

      - name: Install documentation dependencies
        run: sudo apt-get update && sudo apt-get install -y doxygen graphviz

      - name: Configure CMake (docs + Rust bridge)
        run: |
          cmake -S . -B build-rust-bridge-docs \
            -DCMAKE_BUILD_TYPE=${{ env.BUILD_TYPE }} \
            -DXMIPP4_CORE_BUILD_DOC=ON \
            -DXMIPP4_CORE_ENABLE_RUST_BRIDGE=ON

      - name: Build documentation
        run: cmake --build build-rust-bridge-docs --config ${{ env.BUILD_TYPE }} --target doxygen --parallel

      - name: Build project
        run: cmake --build build-rust-bridge-docs --config ${{ env.BUILD_TYPE }} --parallel

      - name: Run all tests
        run: ctest --test-dir build-rust-bridge-docs --build-config ${{ env.BUILD_TYPE }} --output-on-failure

      - name: Run Rust bridge comparison tests
        run: ./build-rust-bridge-docs/tests/unitary/xmipp4-core-unitary-tests [rust_bridge]

  build_with_pip:
    name: pip
    permissions:
      contents: read
    if: github.event_name != 'push'
    strategy:
      matrix:
        os:
        - ubuntu-latest
        - ubuntu-22.04
        - macos-latest
        - windows-latest

    runs-on: ${{ matrix.os }}
    defaults:
      run:
        shell: bash -el {0}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Upgrade pip & packaging for ubuntu 22.04
        if: matrix.os == 'ubuntu-22.04'
        run: python -m pip install --upgrade pip packaging

      - name: Install xmipp4-core with pip
        run: pip install . -v

  build_with_conda:
    name: conda
    permissions:
      contents: read
    if: github.event_name != 'push'
    strategy:
      matrix:
        os:
        - ubuntu-latest
        - macos-latest
        - windows-latest

    runs-on: ${{ matrix.os }}
    defaults:
      run:
        shell: bash -el {0}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up conda
        uses: conda-incubator/setup-miniconda@v4
        with:
          auto-activate: true
          activate-environment: "" # Base is required for conda-build

      - name: Install conda-build and conda-verify
        run: conda install -y conda-build conda-verify python=3.12

      - name: Build with conda
        run: conda build conda
